<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Stok KKP | Manajemen Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4fc 0%, #e6edf8 100%);
            min-height: 100vh;
        }

        /* Navbar Glass */
        .top-navbar {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 74px;
            padding: 0 32px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            box-shadow: 0 8px 16px -6px rgba(37, 99, 235, 0.25);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #0f172a, #2d3a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .role-badge {
            background: linear-gradient(145deg, #e0f2fe, #d9efff);
            color: #0369a1;
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .btn-logout {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.06);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .btn-logout:hover {
            background: #fee2e2;
            border-color: #fecaca;
            color: #dc2626;
            transform: translateY(-1px);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 28px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 28px;
            transition: 0.2s;
            color: #334155;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .back-button:hover {
            background: white;
            border-color: #cbd5e1;
            transform: translateX(-4px);
        }

        /* Card Modern */
        .card-modern {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card-modern:hover {
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            padding: 22px 28px;
            border-bottom: 1px solid #f0f2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            background: rgba(248, 250, 252, 0.5);
        }

        .card-header h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Table Premium */
        .table-container {
            overflow-x: auto;
            padding: 0;
        }

        .stock-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 880px;
        }

        .stock-table th {
            text-align: left;
            padding: 18px 20px;
            background: #fafcff;
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #eef2ff;
        }

        .stock-table td {
            padding: 18px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
            color: #1e293b;
            vertical-align: middle;
        }

        .product-name {
            font-weight: 800;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-name i {
            color: #3b82f6;
            font-size: 1rem;
        }

        .badge-cost {
            background: linear-gradient(145deg, #eef2ff, #e9efff);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2563eb;
            display: inline-block;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-sm {
            padding: 7px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .btn-sm:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Grid Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.05);
        }

        .menu-item i {
            font-size: 2.2rem;
            color: #2563eb;
            margin-bottom: 14px;
            transition: 0.2s;
        }

        .menu-item span {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1e293b;
        }

        .menu-item:hover {
            transform: translateY(-6px);
            background: white;
            border-color: #2563eb;
            box-shadow: 0 25px 30px -14px rgba(37, 99, 235, 0.2);
        }

        .menu-item:hover i {
            transform: scale(1.05);
        }

        /* Uang Masuk Items */
        .uang-item {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #edf2f7;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .uang-item:hover {
            border-color: #cbd5e1;
            transform: translateX(4px);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        input,
        select {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 0.9rem;
            width: 100%;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Profit Card Styles */
        .profit-summary {
            padding: 24px;
        }

        .profit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eef2ff;
            font-size: 1rem;
        }

        .profit-row strong {
            font-size: 1.1rem;
            color: #0f172a;
        }

        .profit-total-card {
            background: linear-gradient(145deg, #d1fae5, #a7f3d0);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin-top: 16px;
        }

        .profit-total-number {
            font-size: 2rem;
            font-weight: 800;
            color: #065f46;
            letter-spacing: -0.5px;
        }

        .profit-locked-card {
            background: #fef3c7;
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin-top: 16px;
        }

        .profit-locked-title {
            font-weight: 700;
            color: #b45309;
            margin-bottom: 8px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 80px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 1200;
            animation: slideUp 0.3s ease;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            max-width: 520px;
            width: 90%;
            border-radius: 44px;
            padding: 32px;
            box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.3);
            animation: modalPop 0.2s;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.96);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Login Page - Responsive */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            max-width: 460px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .register-card {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 36px;
            margin: 20px auto;
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 32px 24px;
                margin: 16px;
                border-radius: 32px;
            }

            .register-card {
                padding: 28px 20px;
                margin: 16px;
                border-radius: 32px;
            }

            .login-card .logo-text {
                font-size: 1.2rem;
            }

            .login-card .logo-icon {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
            }

            .login-card input {
                padding: 10px 16px;
                font-size: 0.85rem;
            }

            .login-card button {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 768px) {
            .navbar-container {
                padding: 0 20px;
                height: 64px;
            }

            .main-content {
                padding: 0 20px;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .card-header {
                padding: 16px 20px;
            }

            .stock-table th,
            .stock-table td {
                padding: 12px 12px;
            }

            .btn-group {
                flex-direction: column;
            }

            .profit-total-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script>
        // ======================== DATA STORE ========================
        let store = {
            users: [{ id: 1, username: "owner", password: "owner", role: "owner", status: "approved" }],
            pendingRegistrations: [],
            inventory: [
                { id: 101, nama: "Beras Premium 5kg", stock: 25, hargaJual: 75000, averageCost: 55000 },
                { id: 102, nama: "Minyak Goreng 1L", stock: 40, hargaJual: 20000, averageCost: 14000 },
                { id: 103, nama: "Gula Pasir 1kg", stock: 30, hargaJual: 18000, averageCost: 13000 },
                { id: 104, nama: "Telur Ayam (1 papan)", stock: 15, hargaJual: 55000, averageCost: 45000 },
                { id: 105, nama: "Tepung Terigu 1kg", stock: 22, hargaJual: 15000, averageCost: 10000 }
            ],
            uangMasukList: [
                { id: 1, jumlah: 8750000, tanggal: "2026-04-01", keterangan: "Penjualan reguler" },
                { id: 2, jumlah: 4200000, tanggal: "2026-04-03", keterangan: "Order grosir" }
            ],
            biayaKonsumsi: 1250000,
            biayaOperasional: 800000,
            activityLogs: [{ id: 1, timestamp: new Date().toLocaleString(), username: "system", action: "Sistem Stok KKP siap digunakan" }]
        };

        function loadStore() { const s = localStorage.getItem("stok_kkp_final_v2"); if (s) { try { const d = JSON.parse(s); store.users = d.users || store.users; store.pendingRegistrations = d.pendingRegistrations || []; store.inventory = d.inventory || store.inventory; store.uangMasukList = d.uangMasukList || store.uangMasukList; store.biayaKonsumsi = d.biayaKonsumsi ?? 1250000; store.biayaOperasional = d.biayaOperasional ?? 800000; store.activityLogs = d.activityLogs || store.activityLogs; } catch (e) { } } }
        function saveStore() { localStorage.setItem("stok_kkp_final_v2", JSON.stringify(store)); }
        loadStore();

        function addActivity(username, action) {
            const id = store.activityLogs.length ? Math.max(...store.activityLogs.map(l => l.id)) + 1 : 1;
            store.activityLogs.push({ id, timestamp: new Date().toLocaleString('id-ID'), username, action });
            if (store.activityLogs.length > 300) store.activityLogs.shift();
            saveStore();
        }
        function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 2600); }

        let currentUser = null, currentView = "login";

        function updateAverageCost(item, newQty, newUnitCost) {
            const oldStock = item.stock;
            const oldAvg = item.averageCost;
            const totalCostBefore = oldStock * oldAvg;
            const newTotalCost = newQty * newUnitCost;
            const newStock = oldStock + newQty;
            const newAvg = (totalCostBefore + newTotalCost) / newStock;
            item.averageCost = Math.round(newAvg);
            item.stock = newStock;
            addActivity(currentUser.username, `Update modal ${item.nama}: beli ${newQty} pcs @Rp ${newUnitCost.toLocaleString()} -> rata-rata baru Rp ${item.averageCost.toLocaleString()}`);
            saveStore();
        }

        function resetUangMasuk() {
            if (confirm("Reset semua data pemasukan? Aksi ini tidak dapat dibatalkan.")) {
                store.uangMasukList = [];
                saveStore();
                addActivity(currentUser.username, "Meriset seluruh data uang masuk");
                toast("Semua data uang masuk direset");
                render();
            }
        }

        function hapusBarang(itemId, itemNama) {
            if (confirm(`Hapus barang "${itemNama}" secara permanen?`)) {
                store.inventory = store.inventory.filter(item => item.id !== itemId);
                saveStore();
                addActivity(currentUser.username, `Menghapus barang: ${itemNama}`);
                toast(`Barang "${itemNama}" telah dihapus`);
                render();
            }
        }

        function render() {
            const app = document.getElementById("app");
            if (!currentUser) {
                if (currentView === "register") {
                    app.innerHTML = renderRegister();
                } else {
                    app.innerHTML = renderLogin();
                }
            } else {
                if (currentUser.role === "owner") {
                    if (currentView === "stokView") app.innerHTML = renderStok(true);
                    else if (currentView === "uangMasukView") app.innerHTML = renderUangMasuk();
                    else if (currentView === "profitView") app.innerHTML = renderProfit();
                    else if (currentView === "modalView") app.innerHTML = renderModal();
                    else if (currentView === "logActivityView") app.innerHTML = renderLog();
                    else if (currentView === "listKaryawanView") app.innerHTML = renderKaryawan();
                    else app.innerHTML = renderOwnerDashboard();
                } else {
                    if (currentView === "stokView") app.innerHTML = renderStok(false);
                    else if (currentView === "uangMasukView") app.innerHTML = renderUangMasuk();
                    else if (currentView === "profitView") app.innerHTML = renderProfit();
                    else app.innerHTML = renderKaryawanDashboard();
                }
            }
            attachEvents();
        }

        // ========== UI KOMPONEN ==========
        function renderLogin() {
            return `
        <div class="login-container">
            <div class="login-card">
                <div class="logo-area" style="justify-content:center; margin-bottom:24px;">
                    <div class="logo-icon"><i class="fas fa-boxes"></i></div>
                    <span class="logo-text">Stok KKP</span>
                </div>
                <p style="margin-bottom:28px; color:#475569;">Manajemen Stok & Keuangan Modern</p>
                <input id="loginUser" placeholder="Username" style="margin-bottom:16px;">
                <input id="loginPass" type="password" placeholder="Password" style="margin-bottom:24px;">
                <button id="btnLogin" style="background:#2563eb; width:100%; padding:14px; border:none; border-radius:60px; color:white; font-weight:700; font-size:1rem; cursor:pointer;">Masuk <i class="fas fa-arrow-right"></i></button>
                <p style="margin-top:24px;"><a href="#" id="gotoReg" style="color:#2563eb; font-weight:500;">Daftar akun karyawan</a></p>
                <div style="font-size:12px; margin-top:20px; background:#f1f5f9; padding:8px; border-radius:40px;">Demo: owner / owner</div>
            </div>
        </div>`;
        }

        function renderRegister() {
            return `
        <div class="login-container">
            <div class="register-card">
                <h2 style="margin-bottom:12px;">Daftar Karyawan</h2>
                <p style="color:#f59e0b; margin-bottom:20px;"><i class="fas fa-clock"></i> Menunggu persetujuan Owner</p>
                <input id="regUser" placeholder="Username" style="margin-bottom:12px;">
                <input id="regPass" type="password" placeholder="Password" style="margin-bottom:12px;">
                <input id="regConfirm" type="password" placeholder="Konfirmasi" style="margin-bottom:24px;">
                <button id="btnReg" style="background:#2563eb; width:100%; padding:14px; border:none; border-radius:60px; color:white; font-weight:700;">Kirim Pendaftaran</button>
                <p style="margin-top:20px;"><a href="#" id="gotoLogin">Kembali Login</a></p>
            </div>
        </div>`;
        }

        function renderOwnerDashboard() {
            const pCount = store.pendingRegistrations.length;
            return `
        <div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge"><i class="fas fa-crown"></i> Owner</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="menu-grid"><div class="menu-item" data-view="stokView"><i class="fas fa-cubes"></i><span>Stok Barang</span></div><div class="menu-item" data-view="uangMasukView"><i class="fas fa-coins"></i><span>Uang Masuk</span></div><div class="menu-item" data-view="profitView"><i class="fas fa-chart-line"></i><span>Profit</span></div><div class="menu-item" data-view="modalView"><i class="fas fa-hand-holding-usd"></i><span>Modal</span></div><div class="menu-item" data-view="logActivityView"><i class="fas fa-history"></i><span>Log Aktivitas</span></div><div class="menu-item" data-view="listKaryawanView"><i class="fas fa-users"></i><span>Karyawan ${pCount ? `(${pCount})` : ''}</span></div></div></div>`;
        }

        function renderKaryawanDashboard() {
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge"><i class="fas fa-id-badge"></i> Karyawan</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="menu-grid"><div class="menu-item" data-view="stokView"><i class="fas fa-cubes"></i><span>Stok Barang</span></div></div><div style="margin-top:28px; background:rgba(255,255,255,0.7); border-radius:32px; padding:28px; text-align:center;">Menu lainnya hanya untuk owner</div></div>`;
        }

        // renderStok dengan parameter isOwner untuk menentukan apakah tampilkan tombol hapus
        function renderStok(isOwner) {
            return `
        <div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">${currentUser?.role === "owner" ? "Owner" : "Karyawan"}</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</div>
        <div class="card-modern"><div class="card-header"><h3><i class="fas fa-warehouse"></i> Manajemen Stok</h3><button id="addBarangBtn" class="btn-sm btn-success"><i class="fas fa-plus"></i> Tambah Barang</button></div>
        <div class="table-container"><table class="stock-table"><thead><tr><th>Produk</th><th>Stok</th><th>Harga Jual</th><th>Modal Rata-rata</th><th>Aksi Stok</th><th>Update Modal / Harga</th>${isOwner ? '<th>Hapus</th>' : ''}</thead><tbody id="stokTbody"></tbody></table></div></div></div>`;
        }

        function renderUangMasuk() {
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">${currentUser?.role === "owner" ? "Owner" : "Karyawan"}</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
        <div class="card-modern"><div class="card-header"><h3><i class="fas fa-coins"></i> Pemasukan</h3><button id="resetUangMasukBtn" class="btn-sm" style="background:#dc2626; color:white;"><i class="fas fa-trash-alt"></i> Reset Semua</button></div>
        <div style="padding:24px;"><div class="flex-between" style="margin-bottom:28px;"><input type="number" id="jumlahUM" placeholder="Nominal (Rp)" style="flex:2"><input type="date" id="tglUM" style="flex:1"><button id="tambahUMBtn" class="btn-sm btn-primary">Input</button></div>
        <h4 style="margin-bottom:16px;">Riwayat Transaksi</h4><div id="daftarUangMasuk" style="max-height:380px; overflow-y:auto;"></div></div></div></div>`;
        }

        function renderProfit() {
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">${currentUser?.role === "owner" ? "Owner" : "Karyawan"}</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
        <div class="card-modern"><div class="card-header"><h3><i class="fas fa-chart-line"></i> Profit Perminggu</h3><button id="generateProfitBtn" class="btn-sm btn-primary">Generate Laporan</button></div><div id="profitArea" style="padding:24px;"></div></div>
        <div class="card-modern" style="margin-top:24px;"><div class="card-header"><h3>Biaya Operasional Mingguan</h3></div><div style="padding:24px;"><div class="flex-between"><div style="flex:1"><label>Konsumsi</label><input type="number" id="konsumsiInput" value="${store.biayaKonsumsi}"></div><div style="flex:1"><label>Operasional</label><input type="number" id="operasionalInput" value="${store.biayaOperasional}"></div><button id="setBiayaBtn" class="btn-sm btn-outline">Simpan</button></div></div></div></div>`;
        }

        function renderModal() {
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">Owner</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
        <div class="card-modern"><div class="card-header"><h3><i class="fas fa-hand-holding-usd"></i> Total Modal (Average Cost)</h3></div><div class="table-container"><table class="stock-table"><thead><tr><th>Nama Barang</th><th>Modal Rata-rata</th><th>Stok</th><th>Total Modal</th></tr></thead><tbody id="modalBody"></tbody></table></div><div id="totalModalAll" style="padding:24px; text-align:right; font-weight:800; font-size:1.3rem;"></div></div></div>`;
        }

        function renderLog() {
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">Owner</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
        <div class="card-modern"><div class="card-header"><h3><i class="fas fa-history"></i> Log Aktivitas</h3></div><div id="logContainer" style="padding:24px; max-height:520px; overflow-y:auto;"></div></div></div>`;
        }

        function renderKaryawan() {
            const active = store.users.filter(u => u.role === "karyawan" && u.status === "approved");
            return `<div class="top-navbar"><div class="navbar-container"><div class="logo-area"><div class="logo-icon"><i class="fas fa-boxes"></i></div><span class="logo-text">Stok KKP</span></div><div class="nav-right"><span class="role-badge">Owner</span><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</button></div></div></div>
        <div class="main-content"><div class="back-button" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</div>
        <div class="card-modern"><div class="card-header"><h3>Manajemen Karyawan</h3><button id="showApprovalBtn" class="btn-sm" style="background:#f59e0b; color:white;"><i class="fas fa-user-check"></i> Persetujuan (${store.pendingRegistrations.length})</button></div><div style="padding:24px;"><h4 style="margin-bottom:16px;">Karyawan Aktif</h4><div class="table-container"><table class="stock-table"><thead><tr><th>Username</th><th>Aksi</th></tr></thead><tbody>${active.map(k => `<tr><td>${k.username}</td><td><button class="resignBtn" data-id="${k.id}" class="btn-sm" style="background:#dc2626; color:white; padding:6px 16px; border:none; border-radius:30px;">Resign</button></td></tr>`).join("")}</tbody></table></div></div></div><div id="pendingModal" style="display:none;"></div></div>`;
        }

        // ========== EVENT HANDLER ==========
        function attachEvents() {
            // Auth
            document.getElementById("btnLogin")?.addEventListener("click", () => { const u = document.getElementById("loginUser").value, p = document.getElementById("loginPass").value, found = store.users.find(u2 => u2.username === u && u2.password === p && u2.status === "approved"); if (found) { currentUser = found; currentView = "dashboardOwner"; addActivity(found.username, "Login ke sistem"); render(); } else toast("Akun tidak ditemukan / belum disetujui"); });
            document.getElementById("gotoReg")?.addEventListener("click", (e) => { e.preventDefault(); currentView = "register"; render(); });
            document.getElementById("gotoLogin")?.addEventListener("click", (e) => { e.preventDefault(); currentView = "login"; render(); });
            document.getElementById("btnReg")?.addEventListener("click", () => { const u = document.getElementById("regUser").value.trim(), p = document.getElementById("regPass").value, c = document.getElementById("regConfirm").value; if (!u || !p) return toast("Lengkapi data"); if (p !== c) return toast("Password tidak cocok"); if (store.users.find(x => x.username === u) || store.pendingRegistrations.find(x => x.username === u)) return toast("Username sudah ada"); store.pendingRegistrations.push({ id: Date.now(), username: u, password: p }); saveStore(); addActivity("system", `Pendaftaran baru: ${u}`); toast("Pendaftaran terkirim, menunggu owner"); currentView = "login"; render(); });
            document.getElementById("logoutBtn")?.addEventListener("click", () => { currentUser = null; currentView = "login"; render(); });
            document.getElementById("backBtn")?.addEventListener("click", () => { if (currentUser?.role === "owner") currentView = "dashboardOwner"; else currentView = "dashboardKaryawan"; render(); });
            document.querySelectorAll(".menu-item").forEach(c => c.addEventListener("click", () => { const v = c.getAttribute("data-view"); if (v) currentView = v; render(); }));

            // STOK TABLE - dengan pengecekan role untuk tombol hapus
            if (currentView === "stokView") {
                const isOwner = currentUser?.role === "owner";
                const tbody = document.getElementById("stokTbody");
                if (tbody) {
                    tbody.innerHTML = store.inventory.map(item => `
                    <tr>
                        <td class="product-name"><i class="fas fa-tag"></i> ${item.nama}</td>
                        <td><span class="badge-cost" style="background:#e6f7ec;">${item.stock}</span></td>
                        <td>Rp ${item.hargaJual.toLocaleString()}</td>
                        <td><span class="badge-cost">Rp ${item.averageCost.toLocaleString()}</span></td>
                        <td><div class="btn-group"><button class="tambahStokBtn btn-sm btn-success" data-id="${item.id}"><i class="fas fa-plus"></i> Tambah</button><button class="kurangiStokBtn btn-sm btn-warning" data-id="${item.id}"><i class="fas fa-minus"></i> Kurang</button></div></td>
                        <td><div class="btn-group"><button class="updateModalBtn btn-sm btn-primary" data-id="${item.id}"><i class="fas fa-chart-line"></i> Update Modal</button><button class="editHargaJualBtn btn-sm btn-secondary" data-id="${item.id}"><i class="fas fa-tag"></i> Harga Jual</button></div></td>
                        ${isOwner ? `<td><button class="hapusBarangBtn btn-sm btn-danger" data-id="${item.id}" data-nama="${item.nama}"><i class="fas fa-trash"></i> Hapus</button></td>` : ''}
                    </tr>
                `).join("");

                    document.querySelectorAll(".tambahStokBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const item = store.inventory.find(i => i.id === id); const qty = parseInt(prompt(`Tambah stok ${item.nama}:`, "1")); if (qty > 0) { item.stock += qty; addActivity(currentUser.username, `Tambah stok ${item.nama} +${qty}`); saveStore(); toast(`Stok +${qty}`); render(); } }); });
                    document.querySelectorAll(".kurangiStokBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const item = store.inventory.find(i => i.id === id); const qty = parseInt(prompt(`Kurangi stok ${item.nama}:`, "1")); if (qty > 0 && item.stock >= qty) { item.stock -= qty; addActivity(currentUser.username, `Kurangi stok ${item.nama} -${qty}`); saveStore(); toast(`Stok -${qty}`); render(); } else toast("Stok tidak cukup"); }); });
                    document.querySelectorAll(".updateModalBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const item = store.inventory.find(i => i.id === id); const qty = parseInt(prompt(`Jumlah beli untuk update modal ${item.nama}:`, "5")); if (qty > 0) { const price = parseFloat(prompt(`Harga beli terbaru per unit (Rp):`, item.averageCost)); if (price > 0) { updateAverageCost(item, qty, price); toast(`Modal update! Rata-rata baru Rp ${item.averageCost.toLocaleString()}`); render(); } } }); });
                    document.querySelectorAll(".editHargaJualBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const item = store.inventory.find(i => i.id === id); const newJual = parseFloat(prompt(`Harga jual baru ${item.nama}:`, item.hargaJual)); if (newJual > 0) { item.hargaJual = newJual; addActivity(currentUser.username, `Ubah harga jual ${item.nama} -> Rp ${newJual.toLocaleString()}`); saveStore(); toast("Harga jual diupdate"); render(); } }); });

                    // Tombol Hapus Barang (hanya untuk owner)
                    document.querySelectorAll(".hapusBarangBtn").forEach(btn => {
                        btn.addEventListener("click", () => {
                            const id = parseInt(btn.dataset.id);
                            const nama = btn.dataset.nama;
                            hapusBarang(id, nama);
                        });
                    });
                }
                document.getElementById("addBarangBtn")?.addEventListener("click", () => { const nama = prompt("Nama produk:"); const hargaJual = parseFloat(prompt("Harga jual:")); const stok = parseInt(prompt("Stok awal:")); const modal = parseFloat(prompt("Modal awal per unit:")); if (nama && !isNaN(hargaJual) && !isNaN(stok) && !isNaN(modal)) { store.inventory.push({ id: Date.now(), nama, stock: stok, hargaJual, averageCost: modal }); saveStore(); addActivity(currentUser.username, `Tambah produk: ${nama}`); toast("Produk ditambahkan"); render(); } });
            }

            // UANG MASUK
            if (currentView === "uangMasukView") {
                const umDiv = document.getElementById("daftarUangMasuk");
                if (umDiv) umDiv.innerHTML = store.uangMasukList.length ? store.uangMasukList.map(um => `<div class="uang-item"><div><i class="fas fa-money-bill-wave" style="color:#10b981;"></i> <strong>Rp ${um.jumlah.toLocaleString()}</strong></div><div><i class="far fa-calendar-alt"></i> ${um.tanggal}</div><div><span class="badge-cost">${um.keterangan}</span></div></div>`).join("") : "<div style='text-align:center;padding:20px;'>Belum ada pemasukan</div>";
                document.getElementById("tambahUMBtn")?.addEventListener("click", () => { const jumlah = parseFloat(document.getElementById("jumlahUM").value); const tanggal = document.getElementById("tglUM").value || new Date().toISOString().slice(0, 10); if (jumlah > 0) { store.uangMasukList.push({ id: Date.now(), jumlah, tanggal, keterangan: "Pemasukan tunai" }); saveStore(); addActivity(currentUser.username, `Pemasukan Rp ${jumlah.toLocaleString()}`); toast("Pemasukan dicatat"); render(); } else toast("Nominal tidak valid"); });
                document.getElementById("resetUangMasukBtn")?.addEventListener("click", () => resetUangMasuk());
            }

            // PROFIT
            if (currentView === "profitView") {
                document.getElementById("generateProfitBtn")?.addEventListener("click", () => {
                    const totalUangMasuk = store.uangMasukList.reduce((a, b) => a + b.jumlah, 0);
                    const konsumsi = store.biayaKonsumsi;
                    const operasional = store.biayaOperasional;
                    const profitKotor = totalUangMasuk - konsumsi - operasional;
                    const isSunday = (new Date().getDay() === 0);
                    const currentDay = new Date().toLocaleDateString('id-ID', { weekday: 'long' });

                    let html = `<div class="profit-summary"><div class="profit-row"><span>Total Uang Masuk</span><strong>Rp ${totalUangMasuk.toLocaleString()}</strong></div><div class="profit-row"><span>Biaya Konsumsi</span><span>Rp ${konsumsi.toLocaleString()}</span></div><div class="profit-row"><span>Biaya Operasional</span><span>Rp ${operasional.toLocaleString()}</span></div>`;
                    if (isSunday) {
                        html += `<div class="profit-total-card"><div style="font-size:0.9rem; font-weight:500; margin-bottom:8px;">TOTAL PROFIT (Hari ke-7)</div><div class="profit-total-number">Rp ${profitKotor.toLocaleString()}</div><div style="font-size:0.7rem; margin-top:8px;">Rumus: Uang Masuk - Konsumsi - Operasional</div></div>`;
                    } else {
                        html += `<div class="profit-locked-card"><div class="profit-locked-title">Profit Hanya Dapat Dilihat di Hari ke-7 (Minggu)</div><div style="font-size:0.85rem; color:#92400e;">Hari ini: ${currentDay}</div><div style="font-size:0.75rem; margin-top:8px; color:#78350f;">Nilai profit sementara: Rp ${profitKotor.toLocaleString()}</div></div>`;
                    }
                    html += `</div>`;
                    document.getElementById("profitArea").innerHTML = html;
                });
                document.getElementById("setBiayaBtn")?.addEventListener("click", () => {
                    store.biayaKonsumsi = parseFloat(document.getElementById("konsumsiInput").value) || 0;
                    store.biayaOperasional = parseFloat(document.getElementById("operasionalInput").value) || 0;
                    saveStore();
                    addActivity(currentUser.username, `Update biaya: Konsumsi ${store.biayaKonsumsi.toLocaleString()}, Operasional ${store.biayaOperasional.toLocaleString()}`);
                    toast("Biaya disimpan");
                    render();
                });
            }

            // MODAL
            if (currentView === "modalView") {
                const mBody = document.getElementById("modalBody"); let grand = 0;
                if (mBody) { mBody.innerHTML = store.inventory.map(item => { const tot = item.stock * item.averageCost; grand += tot; return `<tr><td class="product-name"><i class="fas fa-cube"></i> ${item.nama}</td><td>Rp ${item.averageCost.toLocaleString()}</td><td>${item.stock}</td><td class="badge-cost">Rp ${tot.toLocaleString()}</td>`; }).join(""); document.getElementById("totalModalAll").innerHTML = `Total Keseluruhan Modal: Rp ${grand.toLocaleString()}`; }
            }

            // LOG
            if (currentView === "logActivityView") { const logDiv = document.getElementById("logContainer"); if (logDiv) logDiv.innerHTML = store.activityLogs.slice().reverse().map(l => `<div style="padding:14px 0; border-bottom:1px solid #eef2ff;"><i class="fas fa-user-circle"></i> <strong>${l.username}</strong> <span style="font-size:0.7rem; color:#64748b;">${l.timestamp}</span><br>${l.action}</div>`).join(""); }

            // KARYAWAN APPROVAL
            if (currentView === "listKaryawanView") {
                document.getElementById("showApprovalBtn")?.addEventListener("click", () => { const modalDiv = document.getElementById("pendingModal"); if (modalDiv) { if (store.pendingRegistrations.length === 0) modalDiv.innerHTML = `<div class="modal-backdrop"><div class="modal-card"><p>Tidak ada pendaftaran baru</p><button id="closeModal" class="btn-sm btn-outline">Tutup</button></div></div>`; else modalDiv.innerHTML = `<div class="modal-backdrop"><div class="modal-card"><h3>Persetujuan Karyawan</h3><div class="table-container"><table class="stock-table"><thead><tr><th>Username</th><th>Aksi</th></tr></thead><tbody>${store.pendingRegistrations.map(p => `<tr><td>${p.username}</td><td><button class="approveBtn" data-id="${p.id}" class="btn-sm btn-success">Setujui</button> <button class="rejectBtn" data-id="${p.id}" class="btn-sm" style="background:#dc2626;">Tolak</button></td></tr>`).join("")}</tbody></table></div><button id="closeModal" class="btn-sm btn-outline" style="margin-top:16px;">Tutup</button></div></div>`; modalDiv.style.display = "block"; document.querySelectorAll(".approveBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const p = store.pendingRegistrations.find(pp => pp.id === id); if (p) { store.users.push({ id: p.id, username: p.username, password: p.password, role: "karyawan", status: "approved" }); store.pendingRegistrations = store.pendingRegistrations.filter(pp => pp.id !== id); saveStore(); addActivity(currentUser.username, `Menyetujui karyawan: ${p.username}`); toast("Akun disetujui"); render(); } }); }); document.querySelectorAll(".rejectBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); store.pendingRegistrations = store.pendingRegistrations.filter(pp => pp.id !== id); saveStore(); toast("Pendaftaran ditolak"); render(); }); }); document.getElementById("closeModal")?.addEventListener("click", () => { modalDiv.style.display = "none"; }); } });
                document.querySelectorAll(".resignBtn").forEach(btn => { btn.addEventListener("click", () => { const id = parseInt(btn.dataset.id); const user = store.users.find(u => u.id === id); if (user && confirm(`Resign ${user.username}?`)) { store.users = store.users.filter(u => u.id !== id); saveStore(); addActivity(currentUser.username, `Resign karyawan ${user.username}`); toast("Karyawan dihapus"); render(); } }); });
            }
        }
        render();
    </script>
</body>

</html>
